<!DOCTYPE html>
<html lang="en" data-theme="auto">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>404 — Page Not Found · Yuvashree G</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #f5f3ee;
  --bg2: #eceae4;
  --text: #1a1814;
  --text2: #4a4640;
  --text3: #7a756e;
  --accent: #c4622d;
  --accent2: #e8824a;
  --border: rgba(30,24,16,0.12);
  --card: #ffffff;
  --tag-bg: #f0ebe3;
  --tag-text: #6b4c2a;
}
[data-theme="dark"] {
  --bg: #111009;
  --bg2: #1a1814;
  --text: #f0ece5;
  --text2: #c0bab0;
  --text3: #80786e;
  --accent: #e8824a;
  --accent2: #f0a070;
  --border: rgba(255,245,230,0.1);
  --card: #1e1c18;
  --tag-bg: #2a2318;
  --tag-text: #d4956a;
}
@media (prefers-color-scheme: dark) {
  [data-theme="auto"] {
    --bg: #111009;
    --bg2: #1a1814;
    --text: #f0ece5;
    --text2: #c0bab0;
    --text3: #80786e;
    --accent: #e8824a;
    --accent2: #f0a070;
    --border: rgba(255,245,230,0.1);
    --card: #1e1c18;
    --tag-bg: #2a2318;
    --tag-text: #d4956a;
  }
}

*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:2rem;overflow:hidden;position:relative;transition:background 0.3s,color 0.3s;}

/* BG DECORATION */
.bg-deco{position:fixed;inset:0;pointer-events:none;overflow:hidden;}
.bg-circle{position:absolute;border-radius:50%;opacity:0.06;}
.bg-circle-1{width:600px;height:600px;background:var(--accent);top:-200px;right:-150px;}
.bg-circle-2{width:400px;height:400px;background:var(--accent);bottom:-150px;left:-100px;}
.bg-grid{position:absolute;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:60px 60px;opacity:0.5;}

/* THEME TOGGLE */
.theme-toggle{position:fixed;top:1.25rem;right:1.25rem;display:flex;background:var(--card);border:1px solid var(--border);border-radius:8px;overflow:hidden;z-index:10;}
.theme-btn{border:none;background:none;padding:0.35rem 0.6rem;cursor:pointer;font-size:0.75rem;color:var(--text3);transition:all 0.2s;font-family:'DM Sans',sans-serif;}
.theme-btn.active{background:var(--accent);color:#fff;}

/* LOGO */
.logo{position:fixed;top:1.25rem;left:1.5rem;font-family:'Syne',sans-serif;font-weight:800;font-size:1.2rem;color:var(--text);text-decoration:none;letter-spacing:-0.02em;z-index:10;}
.logo span{color:var(--accent);}

/* MAIN */
.container{position:relative;z-index:1;max-width:560px;width:100%;}

.err-number{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(7rem,22vw,11rem);line-height:1;letter-spacing:-0.06em;color:transparent;-webkit-text-stroke:2px var(--border);position:relative;user-select:none;}
.err-number::after{content:'404';position:absolute;inset:0;color:var(--accent);-webkit-text-stroke:0;opacity:0.08;font-family:'Syne',sans-serif;font-weight:800;}

.err-icon{font-size:3.5rem;margin:0.5rem 0 1.5rem;animation:float 3s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}

.err-title{font-family:'Syne',sans-serif;font-weight:700;font-size:clamp(1.4rem,4vw,2rem);color:var(--text);margin-bottom:0.75rem;letter-spacing:-0.02em;}
.err-desc{font-size:0.95rem;color:var(--text2);line-height:1.75;margin-bottom:2.5rem;max-width:400px;margin-left:auto;margin-right:auto;}

/* COUNTDOWN RING */
.countdown-wrap{display:flex;flex-direction:column;align-items:center;margin-bottom:2.5rem;}
.ring-outer{position:relative;width:80px;height:80px;margin-bottom:0.75rem;}
.ring-svg{transform:rotate(-90deg);width:80px;height:80px;}
.ring-bg{fill:none;stroke:var(--border);stroke-width:4;}
.ring-fg{fill:none;stroke:var(--accent);stroke-width:4;stroke-linecap:round;stroke-dasharray:220;stroke-dashoffset:0;transition:stroke-dashoffset 1s linear;}
.ring-number{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:700;font-size:1.4rem;color:var(--accent);}
.ring-label{font-size:0.78rem;color:var(--text3);letter-spacing:0.06em;text-transform:uppercase;}

/* BUTTONS */
.btn-row{display:flex;gap:0.75rem;justify-content:center;flex-wrap:wrap;}
.btn-primary{background:var(--accent);color:#fff;padding:0.75rem 1.75rem;border-radius:8px;text-decoration:none;font-weight:500;font-size:0.9rem;transition:background 0.2s,transform 0.15s;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;display:inline-flex;align-items:center;gap:0.5rem;}
.btn-primary:hover{background:var(--accent2);transform:translateY(-1px);}
.btn-outline{border:1.5px solid var(--border);color:var(--text);padding:0.75rem 1.75rem;border-radius:8px;text-decoration:none;font-weight:500;font-size:0.9rem;transition:all 0.2s;display:inline-flex;align-items:center;gap:0.5rem;}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);}

/* QUICK LINKS */
.quick-links{margin-top:3rem;padding-top:2rem;border-top:1px solid var(--border);}
.quick-label{font-size:0.75rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--text3);margin-bottom:1rem;font-weight:500;}
.quick-row{display:flex;gap:0.5rem;justify-content:center;flex-wrap:wrap;}
.quick-chip{font-size:0.8rem;padding:0.3rem 0.85rem;border-radius:20px;background:var(--tag-bg);color:var(--tag-text);text-decoration:none;font-weight:500;transition:all 0.2s;border:1px solid transparent;}
.quick-chip:hover{border-color:var(--accent);color:var(--accent);background:transparent;}

/* REDIRECT CANCELLED */
.cancel-msg{font-size:0.82rem;color:var(--text3);margin-top:1rem;min-height:1.2rem;transition:opacity 0.3s;}
</style>
</head>
<body>

<div class="bg-deco">
  <div class="bg-grid"></div>
  <div class="bg-circle bg-circle-1"></div>
  <div class="bg-circle bg-circle-2"></div>
</div>

<a class="logo" href="/">YG<span>.</span></a>

<div class="theme-toggle">
  <button class="theme-btn" data-t="light" title="Light">☀</button>
  <button class="theme-btn active" data-t="auto" title="Auto">⬤</button>
  <button class="theme-btn" data-t="dark" title="Dark">☽</button>
</div>

<div class="container">
  <div class="err-number">404</div>
  <div class="err-icon">🔭</div>
  <h1 class="err-title">Page Lost in the Stack</h1>
  <p class="err-desc">Looks like this route doesn't exist — maybe it was moved, deleted, or the URL has a typo. Let's get you back on track.</p>

  <div class="countdown-wrap">
    <div class="ring-outer">
      <svg class="ring-svg" viewBox="0 0 80 80">
        <circle class="ring-bg" cx="40" cy="40" r="35"/>
        <circle class="ring-fg" id="ring" cx="40" cy="40" r="35"/>
      </svg>
      <div class="ring-number" id="count">10</div>
    </div>
    <div class="ring-label">Redirecting to home</div>
  </div>

  <div class="btn-row">
    <a href="/" class="btn-primary">↩ Go Home Now</a>
    <button class="btn-outline" onclick="cancelRedirect()">✕ Cancel Redirect</button>
  </div>

  <p class="cancel-msg" id="cancel-msg"></p>

  <div class="quick-links">
    <div class="quick-label">Or jump to a section</div>
    <div class="quick-row">
      <a href="index.html#skills" class="quick-chip">Skills</a>
      <a href="index.html#education" class="quick-chip">Education</a>
      <a href="index.html#projects" class="quick-chip">Projects</a>
      <a href="index.html#certifications" class="quick-chip">Certifications</a>
      <a href="index.html#contact" class="quick-chip">Contact</a>
    </div>
  </div>
</div>

<script>
const TOTAL = 10;
let remaining = TOTAL;
let cancelled = false;
let timer;

const ring = document.getElementById('ring');
const countEl = document.getElementById('count');
const msgEl = document.getElementById('cancel-msg');
const CIRCUMFERENCE = 2 * Math.PI * 35;

function updateRing() {
  const progress = remaining / TOTAL;
  ring.style.strokeDashoffset = CIRCUMFERENCE * (1 - progress);
  countEl.textContent = remaining;
}

updateRing();

timer = setInterval(() => {
  if (cancelled) return;
  remaining--;
  updateRing();
  if (remaining <= 0) {
    clearInterval(timer);
    window.location.href = 'index.html';
  }
}, 1000);

function cancelRedirect() {
  cancelled = true;
  clearInterval(timer);
  ring.style.stroke = 'var(--border)';
  countEl.style.color = 'var(--text3)';
  msgEl.textContent = 'Redirect cancelled. Take your time.';
  document.querySelector('.btn-outline').disabled = true;
  document.querySelector('.btn-outline').style.opacity = '0.4';
  document.querySelector('.btn-outline').style.cursor = 'default';
}

// Theme toggle
const html = document.documentElement;
const saved = localStorage.getItem('theme');
if (saved) {
  html.dataset.theme = saved;
  document.querySelectorAll('.theme-btn').forEach(b => b.classList.toggle('active', b.dataset.t === saved));
}
document.querySelectorAll('.theme-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    html.dataset.theme = btn.dataset.t;
    document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    localStorage.setItem('theme', btn.dataset.t);
  });
});
</script>
</body>
</html>
